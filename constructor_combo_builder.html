<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructor — Combo Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --gold-light: #e8d5b0;
  --dark: #0d0d0d;
  --dark2: #141210;
  --dark3: #1c1814;
  --dark4: #232018;
  --cream: #f5f0e8;
  --text: #d4c9b8;
  --border: rgba(201,169,110,0.2);
  --red: #e74c3c;
  --green: #4caf50;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--dark2);
  border-bottom: 1px solid var(--border);
  padding: 0 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topbar-logo {
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
}
.topbar-logo span { color: rgba(255,255,255,0.3); font-weight: 300; }
.topbar-actions { display: flex; gap: 10px; }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  min-height: calc(100vh - 60px);
}
@media(max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .preview-pane { display: none; }
}

/* ── EDITOR PANE ── */
.editor-pane {
  padding: 30px;
  overflow-y: auto;
  border-right: 1px solid var(--border);
}

.editor-section {
  margin-bottom: 36px;
}
.editor-section-title {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ── FIELDS ── */
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.field-row.single { grid-template-columns: 1fr; }
.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.field label {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.field input, .field select {
  background: var(--dark3);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'Poppins', sans-serif;
  font-size: 0.85rem;
  font-weight: 300;
  padding: 9px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field input:focus, .field select:focus { border-color: var(--gold); }
.field input::placeholder { color: rgba(255,255,255,0.2); }
.field select option { background: var(--dark3); }

/* ── ITEM CARDS IN EDITOR ── */
.items-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item-editor-card {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  transition: border-color 0.2s;
}
.item-editor-card:hover { border-color: rgba(201,169,110,0.35); }

.item-editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 8px;
}
.item-drag-handle {
  color: rgba(255,255,255,0.15);
  cursor: grab;
  font-size: 1rem;
  padding: 0 4px;
  user-select: none;
  flex-shrink: 0;
}
.item-editor-num {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--gold);
  opacity: 0.6;
  flex-shrink: 0;
}
.item-editor-actions {
  display: flex;
  gap: 6px;
  margin-left: auto;
}
.icon-btn {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  background: transparent;
  color: rgba(255,255,255,0.3);
  border-radius: 3px;
  cursor: pointer;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--red); color: var(--red); }
.icon-btn.dup:hover { border-color: var(--gold); color: var(--gold); }
.icon-btn.move { font-size: 0.9rem; }
.icon-btn.move:hover { border-color: var(--gold); color: var(--gold); }
.icon-btn.move:disabled { pointer-events: none; }

.item-editor-fields {
  display: grid;
  grid-template-columns: 1fr 100px 100px 120px;
  gap: 8px;
  margin-bottom: 10px;
}
@media(max-width: 600px) {
  .item-editor-fields { grid-template-columns: 1fr; }
}

.item-editor-image {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.img-preview {
  width: 52px;
  height: 52px;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--dark4);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.img-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.img-placeholder-icon {
  font-size: 1.2rem;
  opacity: 0.2;
}
.img-inputs {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.img-url-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.img-or {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.2);
  text-align: center;
}
.file-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  padding: 6px 10px;
  background: var(--dark4);
  border: 1px dashed var(--border);
  color: rgba(255,255,255,0.3);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.file-btn:hover { border-color: var(--gold); color: var(--gold); }
.file-input { display: none; }

/* ── ADD ITEM BUTTON ── */
.add-item-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px dashed rgba(201,169,110,0.25);
  color: rgba(201,169,110,0.5);
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.add-item-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.04); }

/* ── BUTTONS ── */
.btn {
  padding: 10px 20px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--dark);
}
.btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); }
.btn-generate {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--dark);
  padding: 12px 28px;
  font-size: 0.78rem;
}
.btn-generate:hover { background: var(--gold-light); }

/* ── PREVIEW PANE ── */
.preview-pane {
  background: var(--dark2);
  display: flex;
  flex-direction: column;
}
.preview-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.preview-title {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.preview-frame-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}
iframe#preview {
  width: 200%;
  height: 200%;
  transform: scale(0.5);
  transform-origin: top left;
  border: none;
  background: var(--dark);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--dark3);
  border: 1px solid var(--gold);
  color: var(--cream);
  padding: 12px 24px;
  border-radius: 4px;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  z-index: 1000;
  transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── NOTE BOX ── */
.note-box {
  background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.4);
  line-height: 1.6;
}
.note-box strong { color: var(--gold); }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Constructor <span>/ Combo Builder</span></div>
  <div class="topbar-actions">
    <button class="btn" onclick="document.getElementById('importFileInput').click()" title="Cargar una sesión guardada anteriormente" style="border-color:rgba(100,160,255,0.4);color:rgba(100,160,255,0.8)">📂 Cargar sesión</button>
    <input type="file" id="importFileInput" accept=".html" style="display:none" onchange="importSession(this)">
    <button class="btn" onclick="clearStorage()" title="Borrar datos guardados y empezar desde cero" style="border-color:rgba(231,76,60,0.4);color:rgba(231,76,60,0.7)">✕ Limpiar todo</button>
    <button class="btn" onclick="resetToDefaults()">Restablecer</button>
    <button class="btn" onclick="saveConstructor()" title="Descargar el constructor con tu configuración actual guardada" style="border-color:rgba(76,175,80,0.5);color:rgba(76,175,80,0.9)">💾 Guardar sesión</button>
    <button class="btn btn-generate" onclick="generateAndDownload()">⬇ Generar HTML</button>
  </div>
</div>

<div class="layout">

  <!-- ═══════════ EDITOR ═══════════ -->
  <div class="editor-pane">

    <!-- CONFIGURACIÓN GENERAL -->
    <div class="editor-section">
      <div class="editor-section-title">Configuración General</div>
      <div class="field-row">
        <div class="field">
          <label>Título del sitio</label>
          <input type="text" id="cfg-title" value="Combo Builder" oninput="schedulePreview()">
        </div>
        <div class="field">
          <label>Subtítulo</label>
          <input type="text" id="cfg-subtitle" value="Experiencias · Diseña tu paquete ideal" oninput="schedulePreview()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Presupuesto máximo (USD)</label>
          <input type="number" id="cfg-budget" value="350" min="1" oninput="schedulePreview()">
        </div>
        <div class="field">
          <label>Moneda (símbolo)</label>
          <input type="text" id="cfg-currency" value="USD" oninput="schedulePreview()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Título del resumen lateral</label>
          <input type="text" id="cfg-combo-title" value="Combo" oninput="schedulePreview()">
        </div>
        <div class="field">
          <label>Título del resumen promo</label>
          <input type="text" id="cfg-promo-summary-title" value="Resumen con Promo Leisure ✦" oninput="schedulePreview()">
        </div>
      </div>
    </div>

    <!-- PROMO CONFIG -->
    <div class="editor-section">
      <div class="editor-section-title">Promo Leisure</div>
      <div class="field-row">
        <div class="field">
          <label>Texto del tickbox promo</label>
          <input type="text" id="cfg-promo-label" value="Sí, quiero aplicar la promo leisure" oninput="schedulePreview()">
        </div>
        <div class="field">
          <label>Pregunta leisure cash</label>
          <input type="text" id="cfg-promo-question" value="¿Cuánto leisure cash?" oninput="schedulePreview()">
        </div>
      </div>
    </div>



    <!-- ÍTEMS -->
    <div class="editor-section">
      <div class="editor-section-title">Ítems</div>
      <div class="note-box" style="margin-bottom:16px">
        <strong>Imagen:</strong> Pega una URL directa de imagen o sube un archivo desde tu PC. 
        Si dejas vacío, el ítem se muestra sin imagen. Los archivos subidos se incrustan en el HTML final (funciona sin internet).
      </div>
      <div class="items-list" id="itemsList"></div>
      <button class="add-item-btn" onclick="addItem()">+ Agregar ítem</button>
    </div>

  </div>

  <!-- ═══════════ PREVIEW ═══════════ -->
  <div class="preview-pane">
    <div class="preview-header">
      <span class="preview-title">Vista previa (50%)</span>
      <button class="btn" style="padding:5px 12px;font-size:0.65rem" onclick="refreshPreview()">↻ Actualizar</button>
    </div>
    <div class="preview-frame-wrap">
      <iframe id="preview" title="Preview"></iframe>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
//  SESSION FLAG (true in saved session files)
// ─────────────────────────────────────────
const IS_SAVED_SESSION = false;

// ─────────────────────────────────────────
//  DEFAULT DATA
// ─────────────────────────────────────────
const DEFAULT_ITEMS = [
  { id: 'massage50',      cat: 'Masajes',   catEmoji: '💆', name: 'Masaje 50 min',                        price: 100, pricePromo: 100, note: '',                        img: '' },
  { id: 'massage80',      cat: 'Masajes',   catEmoji: '💆', name: 'Masaje 80 min',                        price: 125, pricePromo: 125, note: '',                        img: '' },
  { id: 'massage50cbd',   cat: 'Masajes',   catEmoji: '💆', name: 'Masaje 50 min + CBD Oil',              price: 125, pricePromo: 125, note: '',                        img: '' },
  { id: 'massage80cbd',   cat: 'Masajes',   catEmoji: '💆', name: 'Masaje 80 min + CBD Oil',              price: 150, pricePromo: 150, note: '',                        img: '' },
  { id: 'dinner',         cat: 'Cena',      catEmoji: '🍽', name: 'Cena romántica',                       price: 150, pricePromo: 150, note: '',                        img: '' },
  { id: 'dinnerlob',      cat: 'Cena',      catEmoji: '🍽', name: 'Cena romántica + Lobster',             price: 200, pricePromo: 200, note: '',                        img: '' },
  { id: 'dinnerlobchamp', cat: 'Cena',      catEmoji: '🍽', name: 'Cena romántica + Lobster + Champagne', price: 250, pricePromo: 250, note: '',                        img: '' },
  { id: 'balibeach',      cat: 'Bali Bed',  catEmoji: '🛏', name: 'Bali Bed en Playa',                   price: 150, pricePromo: 150, note: '',                        img: '' },
  { id: 'baliinfinity',   cat: 'Bali Bed',  catEmoji: '🛏', name: 'Bali Bed en Infinity Pool',            price: 250, pricePromo: 250, note: '',                        img: '' },
  { id: 'balipool',       cat: 'Bali Bed',  catEmoji: '🛏', name: 'Bali Bed en Alberca',                 price: 100, pricePromo: 100, note: '',                        img: '' },
  { id: 'baliseaside',    cat: 'Bali Bed',  catEmoji: '🛏', name: 'Bali Bed Seaside',                    price:  50, pricePromo:  50, note: 'Solo al comprar cena',    img: '' },
  { id: 'preferred',      cat: 'Extras',    catEmoji: '⭐', name: 'Preferred Benefits',                   price: 200, pricePromo: 200, note: '',                        img: '' },
  { id: 'excursion',      cat: 'Extras',    catEmoji: '⭐', name: 'Ticket de Excursión',                  price: 150, pricePromo: 150, note: '',                        img: '' },
];

let items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
let previewTimer = null;
let idCounter = 100;

// ─────────────────────────────────────────
//  RENDER EDITOR
// ─────────────────────────────────────────
function renderEditor() {
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'item-editor-card';
    card.dataset.idx = idx;

    // Decide preview src
    const previewSrc = item.img || '';

    card.innerHTML = `
      <div class="item-editor-header">
        <span class="item-drag-handle">⠿</span>
        <span class="item-editor-num">#${idx + 1}</span>
        <div class="item-editor-actions">
          <button class="icon-btn move" title="Subir" onclick="moveItem(${idx},-1)" ${idx === 0 ? 'disabled style="opacity:0.2;cursor:default"' : ''}>↑</button>
          <button class="icon-btn move" title="Bajar" onclick="moveItem(${idx},1)" ${idx === items.length-1 ? 'disabled style="opacity:0.2;cursor:default"' : ''}>↓</button>
          <button class="icon-btn dup" title="Duplicar" onclick="dupItem(${idx})">⧉</button>
          <button class="icon-btn" title="Eliminar" onclick="removeItem(${idx})">✕</button>
        </div>
      </div>
      <div class="item-editor-fields">
        <div class="field">
          <label>Nombre del ítem</label>
          <input type="text" value="${esc(item.name)}" oninput="updateItem(${idx},'name',this.value)" placeholder="Ej. Masaje 50 min">
        </div>
        <div class="field">
          <label>Precio regular</label>
          <input type="number" value="${item.price}" min="0" oninput="updateItem(${idx},'price',+this.value)">
        </div>
        <div class="field">
          <label>Precio promo</label>
          <input type="number" value="${item.pricePromo !== undefined ? item.pricePromo : item.price}" min="0" oninput="updateItem(${idx},'pricePromo',+this.value)">
        </div>
        <div class="field">
          <label>Categoría</label>
          <input type="text" value="${esc(item.cat)}" oninput="updateItem(${idx},'cat',this.value)" placeholder="Ej. Masajes">
        </div>
        <div class="field" style="max-width:80px">
          <label>Icono</label>
          <input type="text" value="${esc(item.catEmoji || '')}" oninput="updateItem(${idx},'catEmoji',this.value)" placeholder="💆" style="text-align:center;font-size:1.2rem;padding:6px 4px">
        </div>
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>Nota (opcional)</label>
        <input type="text" value="${esc(item.note)}" oninput="updateItem(${idx},'note',this.value)" placeholder="Ej. Solo al comprar cena">
      </div>
      <div class="item-editor-image">
        <div class="img-preview" id="imgprev-${idx}">
          ${previewSrc
            ? `<img src="${esc(previewSrc)}" alt="" onerror="this.style.display='none'">`
            : `<span class="img-placeholder-icon">🖼</span>`}
        </div>
        <div class="img-inputs">
          <label style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3)">Imagen</label>
          <div class="img-url-row">
            <input type="text" style="flex:1" placeholder="Pega URL de imagen..." value="${esc(item.img && item.img.startsWith('http') ? item.img : '')}" oninput="setImgUrl(${idx}, this.value)">
          </div>
          <div class="img-or">— o sube un archivo —</div>
          <label class="file-btn" for="fileInput-${idx}">📁 Seleccionar archivo</label>
          <input class="file-input" type="file" accept="image/*" id="fileInput-${idx}" onchange="handleFile(${idx}, this)">
        </div>
      </div>
    `;
    list.appendChild(card);
  });
  schedulePreview();
}

function esc(str) {
  return String(str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─────────────────────────────────────────
//  ITEM OPERATIONS
// ─────────────────────────────────────────
function updateItem(idx, key, val) {
  items[idx][key] = val;
  // If name changed, regenerate id
  if (key === 'name') {
    items[idx].id = 'item_' + idx + '_' + Date.now();
  }
  schedulePreview();
}

function removeItem(idx) {
  if (items.length <= 1) { showToast('Debe haber al menos 1 ítem'); return; }
  items.splice(idx, 1);
  renderEditor();
}

function moveItem(idx, dir) {
  const target = idx + dir;
  if (target < 0 || target >= items.length) return;
  const tmp = items[idx];
  items[idx] = items[target];
  items[target] = tmp;
  renderEditor();
  // Scroll the moved card into view
  setTimeout(() => {
    const cards = document.querySelectorAll('.item-editor-card');
    if (cards[target]) cards[target].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function dupItem(idx) {
  const copy = JSON.parse(JSON.stringify(items[idx]));
  copy.id = 'item_dup_' + (++idCounter);
  copy.name = copy.name + ' (copia)';
  items.splice(idx + 1, 0, copy);
  renderEditor();
}

function addItem() {
  items.push({
    id: 'item_new_' + (++idCounter),
    cat: 'Nueva Categoría',
    name: 'Nuevo Ítem',
    price: 100,
    note: '',
    img: ''
  });
  renderEditor();
  // Scroll to bottom
  setTimeout(() => {
    const list = document.getElementById('itemsList');
    list.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function resetToDefaults() {
  if (!confirm('¿Restablecer todo a los valores originales?')) return;
  items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  document.getElementById('cfg-title').value = 'Combo Builder';
  document.getElementById('cfg-subtitle').value = 'Experiencias · Diseña tu paquete ideal';
  document.getElementById('cfg-budget').value = '350';
  document.getElementById('cfg-currency').value = 'USD';
  document.getElementById('cfg-promo-label').value = 'Sí, quiero aplicar la promo leisure';
  document.getElementById('cfg-promo-question').value = '¿Cuánto leisure cash?';
  renderEditor();
}

// ─────────────────────────────────────────
//  IMAGE HANDLING
// ─────────────────────────────────────────
function setImgUrl(idx, url) {
  items[idx].img = url.trim();
  updateImgPreview(idx);
  schedulePreview();
}

function handleFile(idx, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    items[idx].img = e.target.result; // base64
    updateImgPreview(idx);
    schedulePreview();
  };
  reader.readAsDataURL(file);
}

function updateImgPreview(idx) {
  const prev = document.getElementById('imgprev-' + idx);
  if (!prev) return;
  const src = items[idx].img;
  if (src) {
    prev.innerHTML = `<img src="${src}" alt="" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;display:block">`;
  } else {
    prev.innerHTML = `<span class="img-placeholder-icon">🖼</span>`;
  }
}

// ─────────────────────────────────────────
//  PREVIEW
// ─────────────────────────────────────────
function schedulePreview() {
  saveState();
  clearTimeout(previewTimer);
  previewTimer = setTimeout(refreshPreview, 600);
}

function refreshPreview() {
  const iframe = document.getElementById('preview');
  const html = generateHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  iframe.src = url;
}

          </div>
          <input class="promo-cash-input" type="number" id="leisureCash" placeholder="0" min="0" oninput="renderPromo()">
        </div>
      </div>

      <!-- ④ COMBOS GUARDADOS -->
      <div class="saved-section" id="savedSection">
        <div class="section-title">Combos Guardados</div>

<script>
const CURRENCY = '${htmlEsc(currency)}';
const items = ${itemsJSON};

let quantities = {};
items.forEach(i => quantities[i.id] = 0);
let savedCombos = [], comboCount = 0, promoActive = false;

const CAT_EMOJI = { 'Masajes': '💆', 'Cena': '🍽', 'Bali Bed': '🛏', 'Extras': '⭐' };
function getEmoji(cat, item) {
  if (item && item.catEmoji) return item.catEmoji;
  return CAT_EMOJI[cat] || '✦';
}
function getSelected() { return items.filter(i => quantities[i.id] > 0); }
function getTotal(promo) { return items.reduce((s,i) => s + (promo ? i.pricePromo : i.price) * (quantities[i.id]||0), 0); }

// ── Main render ──────────────────────────────────────────────
function render() {
  const selected = getSelected();
  const total    = getTotal(false);
  const empty    = document.getElementById('emptyState');
  const list     = document.getElementById('comboList');
  const footer   = document.getElementById('comboFooter');

  if (!selected.length) {
    empty.style.display = 'block'; list.innerHTML = ''; footer.style.display = 'none';
  } else {
    empty.style.display = 'none';
    list.innerHTML = selected.map(i => \`
      <li class="combo-item">
        \${i.img ? \`<div class="combo-item-thumb"><img src="\${i.img}" alt=""></div>\`
                 : \`<div class="combo-item-thumb">\${getEmoji(i.cat)}</div>\`}
        <div class="combo-item-info">
          <div class="combo-item-name">\${i.name}</div>
          \${quantities[i.id] > 1 ? \`<div class="combo-item-qty">× \${quantities[i.id]}</div>\` : ''}
        </div>
        <div class="combo-item-price">$\${i.price * quantities[i.id]}</div>
      </li>\`).join('');
    footer.style.display = 'block';
    document.getElementById('comboTotal').textContent = '$' + total + ' ' + CURRENCY;
  }
  items.forEach(i => updateCard(i.id));
  updateBadges();
  renderPromo();
}

// ── Update individual item card ──────────────────────────────
function updateCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const item = items.find(x => x.id === id);
  const qty  = quantities[id];
  card.className = 'item-card' + (qty > 0 ? ' selected' : '');
  card.querySelector('.qty-num').textContent = qty;
  card.querySelector('.minus').style.opacity = qty === 0 ? '0.3' : '1';

  const regEl   = card.querySelector('.item-price-regular');
  const promoEl = card.querySelector('.item-price-promo');
  const hasDiff = item.pricePromo !== item.price;

  if (promoActive && hasDiff) {
    regEl.classList.add('struck');
    promoEl.classList.add('show');
    promoEl.textContent = '$' + item.pricePromo;
  } else {
    regEl.classList.remove('struck');
    promoEl.classList.remove('show');
    regEl.textContent = '$' + item.price;
  }
}

function updateBadges() {
  document.querySelectorAll('.category').forEach(catEl => {
    const cat = catEl.dataset.cat;
    const n = items.filter(i => i.cat === cat && quantities[i.id] > 0).length;
    const badge = catEl.querySelector('.cat-badge');
    if (badge) { badge.textContent = n + ' seleccionado' + (n !== 1 ? 's' : ''); badge.classList.toggle('visible', n > 0); }
  });
}

// ── Promo toggle ─────────────────────────────────────────────
function togglePromo() {
  promoActive = !promoActive;
  document.getElementById('promoChk').classList.toggle('checked', promoActive);
  document.getElementById('promoCashArea').classList.toggle('open', promoActive);
  document.getElementById('promoBox').classList.toggle('active', promoActive);

  // NOTE: intentionally NOT clearing leisureCash so the value is remembered
  render();
}

// ── Promo summary render ─────────────────────────────────────
function renderPromo() {
  const summaryEl = document.getElementById('promoSummary');
  const selected  = getSelected();
  if (!promoActive || !selected.length) { summaryEl.classList.remove('show'); return; }

  const cash        = Math.max(0, parseFloat(document.getElementById('leisureCash').value) || 0);
  const promoTotal  = getTotal(true);
  const finalTotal  = Math.max(0, promoTotal - cash);

  summaryEl.classList.add('show');

  document.getElementById('promoList').innerHTML = selected.map(i => \`
    <li class="promo-item">
      \${i.img ? \`<div class="promo-item-thumb"><img src="\${i.img}" alt=""></div>\`
               : \`<div class="promo-item-thumb">\${getEmoji(i.cat)}</div>\`}
      <div class="promo-item-info">
        <div class="promo-item-name">\${i.name}</div>
        \${quantities[i.id] > 1 ? \`<div class="promo-item-qty">× \${quantities[i.id]}</div>\` : ''}
      </div>
      <div class="promo-item-price">$\${i.pricePromo * quantities[i.id]}</div>
    </li>\`).join('');

  document.getElementById('promoSubtotal').textContent = '$' + promoTotal + ' ' + CURRENCY;
  document.getElementById('promoCashLine').textContent  = '− $' + cash + ' ' + CURRENCY;
  const finalEl = document.getElementById('promoFinal');
  finalEl.textContent = '$' + finalTotal + ' ' + CURRENCY;
  finalEl.className = 'promo-final-price' + (finalTotal === 0 ? ' zero' : '');
}

// ── Accordion ────────────────────────────────────────────────
function toggleCat(id) {
  const body = document.getElementById('body-' + id), arrow = document.getElementById('arrow-' + id), hdr = document.getElementById('hdr-' + id);
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open); arrow.classList.toggle('open', !open); hdr.classList.toggle('open', !open);
}

// ── Combo save/load/clear ────────────────────────────────────
function clearCombo() { items.forEach(i => quantities[i.id] = 0); render(); }

function saveCombo() {
  const sel = getSelected(); if (!sel.length) return;
  comboCount++;
  savedCombos.push({ id: comboCount, name: 'Combo ' + comboCount, total: getTotal(false), items: sel.map(i => ({...i, qty: quantities[i.id]})) });
  renderSaved();
}

function renderSaved() {
  const sec = document.getElementById('savedSection'), list = document.getElementById('savedList');
  if (!savedCombos.length) { sec.classList.remove('show'); return; }
  sec.classList.add('show');
  list.innerHTML = savedCombos.map(c => \`
    <div class="saved-card">
      <div class="saved-card-header">
        <span class="saved-card-name">\${c.name}</span>
        <span class="saved-card-price">$\${c.total} \${CURRENCY}</span>
      </div>
      <div class="saved-card-items">\${c.items.map(i => i.name + (i.qty > 1 ? ' ×'+i.qty : '')).join(' · ')}</div>
      <div class="saved-card-actions">
        <span class="tag" onclick="loadCombo(\${c.id})">↩ Cargar</span>
        <span class="tag del" onclick="deleteCombo(\${c.id})">✕ Eliminar</span>
      </div>
    </div>\`).join('');
}

function loadCombo(id) {
  const c = savedCombos.find(x => x.id === id); if (!c) return;
  items.forEach(i => quantities[i.id] = 0);
  c.items.forEach(i => quantities[i.id] = i.qty);
  render();
}
function deleteCombo(id) { savedCombos = savedCombos.filter(x => x.id !== id); renderSaved(); }

// ── Build UI ─────────────────────────────────────────────────
function buildUI() {
  const cats = [...new Set(items.map(i => i.cat))];
  const container = document.getElementById('categories');
  cats.forEach((cat, ci) => {
    const catId    = 'cat' + ci;
    const catItems = items.filter(i => i.cat === cat);
    const catDiv   = document.createElement('div');
    catDiv.className = 'category'; catDiv.dataset.cat = cat;
    catDiv.innerHTML = \`
      <div class="category-header" id="hdr-\${catId}" onclick="toggleCat('\${catId}')">
        <div class="cat-left">
          <span class="cat-emoji">\${getEmoji(cat, catItems[0])}</span>
          <span class="cat-name">\${cat}</span>
          <span class="cat-count">(\${catItems.length} ítems)</span>
        </div>
        <div class="cat-right">
          <span class="cat-badge" id="badge-\${catId}"></span>
          <span class="cat-arrow" id="arrow-\${catId}">&#9660;</span>
        </div>
      </div>
      <div class="category-body" id="body-\${catId}">
        <div class="items-grid" id="grid-\${catId}"></div>
      </div>\`;
    container.appendChild(catDiv);
    const grid = document.getElementById('grid-' + catId);
    catItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card'; card.id = 'card-' + item.id;

      // Image
      if (item.img) {
        const img = document.createElement('img'); img.className = 'item-img'; img.src = item.img; img.alt = item.name;
        img.onerror = function(){ this.style.display='none'; }; card.appendChild(img);
      } else {
        const ph = document.createElement('div'); ph.className = 'item-img-placeholder'; ph.textContent = getEmoji(cat, item); card.appendChild(ph);
      }

      // Body
      const body = document.createElement('div'); body.className = 'item-body';
      const nameEl = document.createElement('div'); nameEl.className = 'item-name'; nameEl.textContent = item.name; body.appendChild(nameEl);
      if (item.note) { const n = document.createElement('div'); n.className = 'item-note'; n.textContent = '* ' + item.note; body.appendChild(n); }
      card.appendChild(body);

      // Right: price wrap + qty
      const right = document.createElement('div'); right.className = 'item-right';
      const priceWrap = document.createElement('div'); priceWrap.className = 'item-price-wrap';
      const regEl = document.createElement('div'); regEl.className = 'item-price-regular'; regEl.textContent = '$' + item.price;
      const promoEl = document.createElement('div'); promoEl.className = 'item-price-promo'; promoEl.textContent = '$' + item.pricePromo;
      priceWrap.appendChild(regEl); priceWrap.appendChild(promoEl);

      const qtyCtrl = document.createElement('div'); qtyCtrl.className = 'qty-control';
      const minus = document.createElement('button'); minus.className = 'qty-btn minus'; minus.textContent = '−'; minus.style.opacity = '0.3';
      const num   = document.createElement('span'); num.className = 'qty-num'; num.textContent = '0';
      const plus  = document.createElement('button'); plus.className = 'qty-btn plus'; plus.textContent = '+';
      minus.addEventListener('click', e => { e.stopPropagation(); if (quantities[item.id] > 0) { quantities[item.id]--; updateCard(item.id); render(); } });
      plus.addEventListener('click',  e => { e.stopPropagation(); quantities[item.id]++; updateCard(item.id); render(); });
      qtyCtrl.appendChild(minus); qtyCtrl.appendChild(num); qtyCtrl.appendChild(plus);

      right.appendChild(priceWrap); right.appendChild(qtyCtrl);
      card.appendChild(right); grid.appendChild(card);
    });
  });
  render();
}

function htmlEsc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────
//  SAVE CONSTRUCTOR SESSION
// ─────────────────────────────────────────
function saveConstructor() {
  // Collect current state
  const title      = document.getElementById('cfg-title').value || 'Combo Builder';
  const subtitle   = document.getElementById('cfg-subtitle').value || '';
  const budget     = document.getElementById('cfg-budget').value || '350';
  const currency   = document.getElementById('cfg-currency').value || 'USD';
  const promoLabel = document.getElementById('cfg-promo-label').value || '';
  const promoQ     = document.getElementById('cfg-promo-question').value || '';

  // Bake state directly into the constructor HTML as default values
  let snapshot = document.documentElement.outerHTML;

  // Replace DEFAULT_ITEMS with current items (including images)
  const itemsJSON = JSON.stringify(items, null, 2);
  snapshot = snapshot.replace(
    /const DEFAULT_ITEMS = \[[\s\S]*?\];/,
    'const DEFAULT_ITEMS = ' + itemsJSON + ';'
  );

  // Mark snapshot as saved session → localStorage will be ignored on open
  snapshot = snapshot.replace(
    'const IS_SAVED_SESSION = false;',
    'const IS_SAVED_SESSION = true;'
  );

  // Replace default field values in the HTML
  snapshot = snapshot.replace(
    /id="cfg-title" value="[^"]*"/,
    'id="cfg-title" value="' + title.replace(/"/g,'&quot;') + '"'
  );
  snapshot = snapshot.replace(
    /id="cfg-subtitle" value="[^"]*"/,
    'id="cfg-subtitle" value="' + subtitle.replace(/"/g,'&quot;') + '"'
  );
  snapshot = snapshot.replace(
    /id="cfg-budget" value="[^"]*"/,
    'id="cfg-budget" value="' + budget + '"'
  );
  snapshot = snapshot.replace(
    /id="cfg-currency" value="[^"]*"/,
    'id="cfg-currency" value="' + currency.replace(/"/g,'&quot;') + '"'
  );
  snapshot = snapshot.replace(
    /id="cfg-promo-label" value="[^"]*"/,
    'id="cfg-promo-label" value="' + promoLabel.replace(/"/g,'&quot;') + '"'
  );
  snapshot = snapshot.replace(
    /id="cfg-promo-question" value="[^"]*"/,
    'id="cfg-promo-question" value="' + promoQ.replace(/"/g,'&quot;') + '"'
  );

  const blob = new Blob([snapshot], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'constructor-sesion.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 Sesión guardada como constructor-sesion.html');
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────

// ─────────────────────────────────────────
//  LOCAL STORAGE — PERSISTENCE
// ─────────────────────────────────────────
const LS_KEY = 'comboBuilderState_v1';

function saveState() {
  if (IS_SAVED_SESSION) return;
  try {
    const state = {
      title:        document.getElementById('cfg-title').value,
      subtitle:     document.getElementById('cfg-subtitle').value,
      budget:       document.getElementById('cfg-budget').value,
      currency:     document.getElementById('cfg-currency').value,
      promoLabel:       document.getElementById('cfg-promo-label').value,
      promoQ:           document.getElementById('cfg-promo-question').value,
      comboTitle:       document.getElementById('cfg-combo-title').value,
      promoSummTitle:   document.getElementById('cfg-promo-summary-title').value,
      items:        items,
    };
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch(e) { /* storage full or unavailable — fail silently */ }
}

function loadState() {
  if (IS_SAVED_SESSION) return false;
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.title    !== undefined) document.getElementById('cfg-title').value       = state.title;
    if (state.subtitle !== undefined) document.getElementById('cfg-subtitle').value    = state.subtitle;
    if (state.budget   !== undefined) document.getElementById('cfg-budget').value      = state.budget;
    if (state.currency !== undefined) document.getElementById('cfg-currency').value    = state.currency;
    if (state.promoLabel     !== undefined) document.getElementById('cfg-promo-label').value           = state.promoLabel;
    if (state.promoQ         !== undefined) document.getElementById('cfg-promo-question').value       = state.promoQ;
    if (state.comboTitle     !== undefined) document.getElementById('cfg-combo-title').value          = state.comboTitle;
    if (state.promoSummTitle !== undefined) document.getElementById('cfg-promo-summary-title').value  = state.promoSummTitle;
    if (Array.isArray(state.items) && state.items.length > 0) items = state.items;
    return true;
  } catch(e) { return false; }
}

function clearStorage() {
  if (!confirm('¿Borrar todos los datos guardados y empezar desde cero?')) return;
  localStorage.removeItem(LS_KEY);
  items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  document.getElementById('cfg-title').value       = 'Combo Builder';
  document.getElementById('cfg-subtitle').value    = 'Experiencias · Diseña tu paquete ideal';
  document.getElementById('cfg-budget').value      = '350';
  document.getElementById('cfg-currency').value    = 'USD';
  document.getElementById('cfg-promo-label').value          = 'Sí, quiero aplicar la promo leisure';
  document.getElementById('cfg-promo-question').value       = '¿Cuánto leisure cash?';
  document.getElementById('cfg-combo-title').value          = 'Combo';
  document.getElementById('cfg-promo-summary-title').value  = 'Resumen con Promo Leisure ✦';
  renderEditor();
  showToast('✓ Datos borrados — constructor reiniciado');
}

// ─────────────────────────────────────────
//  IMPORT SESSION
// ─────────────────────────────────────────
function importSession(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const html = e.target.result;

      // ── Extract DEFAULT_ITEMS ──
      const itemsMatch = html.match(/const DEFAULT_ITEMS = (\[\s*\{[\s\S]*?\]\s*);/);
      if (itemsMatch) {
        const extracted = JSON.parse(itemsMatch[1]);
        if (Array.isArray(extracted) && extracted.length > 0) {
          items = extracted;
        }
      }

      // ── Extract config field values ──
      const fields = [
        'cfg-title', 'cfg-subtitle', 'cfg-budget', 'cfg-currency',
        'cfg-combo-title', 'cfg-promo-summary-title',
        'cfg-promo-label', 'cfg-promo-question'
      ];
      fields.forEach(id => {
        const regex = new RegExp('id="' + id + '" value="([^"]*)"');
        const match = html.match(regex);
        if (match) {
          const el = document.getElementById(id);
          if (el) el.value = match[1]
            .replace(/&quot;/g, '"')
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>');
        }
      });

      renderEditor();
      saveState();
      showToast('✓ Sesión cargada correctamente');
    } catch(err) {
      showToast('⚠ Error al leer el archivo');
      console.error(err);
    }
    input.value = ''; // reset so same file can be re-imported
  };
  reader.readAsText(file);
}
